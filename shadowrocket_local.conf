[Rule]
# === Bypass Ngân Hàng & Ví Điện Tử (Ưu tiên cao nhất) ===
DOMAIN-SUFFIX,mbbank.com.vn,DIRECT
DOMAIN-SUFFIX,zalopay.vn,DIRECT
DOMAIN-SUFFIX,momo.vn,DIRECT
DOMAIN-SUFFIX,vnpay.vn,DIRECT

# === Tối Ưu Ping Game ===
DOMAIN-SUFFIX,roblox.com,DIRECT
DOMAIN-SUFFIX,rbxcdn.com,DIRECT
DOMAIN-SUFFIX,hoyoverse.com,DIRECT
DOMAIN-SUFFIX,mihoyo.com,DIRECT
DOMAIN-SUFFIX,garena.vn,DIRECT

# === Mạng Cục Bộ & VPN Cá Nhân (Tailscale) ===
IP-CIDR,100.64.0.0/10,DIRECT
IP-CIDR,192.168.0.0/16,DIRECT
IP-CIDR,10.0.0.0/8,DIRECT

# === API Dev / AI ===
DOMAIN-SUFFIX,huggingface.co,PROXY
DOMAIN-SUFFIX,elevenlabs.io,PROXY
DOMAIN-SUFFIX,vercel.app,PROXY
DOMAIN-SUFFIX,supabase.co,PROXY
DOMAIN-SUFFIX,openai.com,PROXY

# === YouTube - Chỉ chặn UDP để tránh leak DNS ===
AND,((DOMAIN-SUFFIX,googlevideo.com),(PROTOCOL,UDP)),REJECT
AND,((DOMAIN,youtubei.googleapis.com),(PROTOCOL,UDP)),REJECT

[Header Rewrite]
# Locket/RevenueCat - Xoa ETag de server luon tra full response body (tranh 304 Not Modified)
# Shadowrocket Header Rewrite: http-request/http-response <pattern> header-del/header-add KEY [VALUE]
http-request ^https?://api\.revenuecat\.com/ header-del X-RevenueCat-ETag
http-request ^https?://api\.revenuecat\.com/ header-del x-revenuecat-etag
http-request ^https?://api\.revenuecat\.com/ header-del If-None-Match
http-request ^https?://api\.revenuecat\.com/ header-del if-none-match
# Spotify - xoa ETag cache
http-request ^https?://(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)/user-customization-service/v1/customize header-del if-none-match

[Url Rewrite]
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad _ reject-200
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads _ reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) _ reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext _ reject-200
(^https?:\/\/[\w-]+\.googlevideo\.com\/(?!dclk_video_ads).+?)&ctier=L(&.+?),ctier,(.+) $1$2$3 302

[Script]
# ==========================================
# Sub-Store
# ==========================================
Sub-Store Core = type=http-request,pattern=^https?:\/\/sub\.store\/((download)|api\/(preview|sync|(utils\/node-info))),script-path=sub-store-1.min.js,requires-body=true,timeout=120
Sub-Store Simple = type=http-request,pattern=^https?:\/\/sub\.store,script-path=sub-store-0.min.js,requires-body=true
Sub-Store Sync = type=cron,cronexp=0 0 * * *,wake-system=1,timeout=120,script-path=cron-sync-artifacts.min.js

# ==========================================
# YouTube Premium
# ==========================================
youtube.request = type=http-request,pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|reel\/reel_watch_sequence|get_watch),requires-body=1,max-size=-1,binary-body-mode=1,engine=jsc,script-path=youtube.response.js
youtube.response = type=http-response,pattern=^https:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|player|search|reel\/reel_watch_sequence|guide|account\/get_setting|get_watch),requires-body=1,max-size=-1,binary-body-mode=1,script-path=youtube.response.js,argument={"lyricLang":"vi","captionLang":"vi","blockUpload":true,"blockImmersive":true,"debug":false}

# ==========================================
# Spotify iOS15 (app2smile)
# ==========================================
spotify-json = type=http-request,pattern=^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/(artistview\/v1\/artist|album-entity-view\/v2\/album)\/,requires-body=0,script-path=spotify-json.js
spotify-proto = type=http-response,pattern=^https:\/\/(spclient\.wg\.spotify\.com|.*-spclient\.spotify\.com(:443)?)\/(bootstrap\/v1\/bootstrap|user-customization-service\/v1\/customize)$,requires-body=1,binary-body-mode=1,max-size=0,script-path=spotify-proto.js,script-update-interval=0

# ==========================================
# SoundCloud Go+
# ==========================================
SoundCloudGoPlus = type=http-response,pattern=^https?:\/\/api-mobile\.soundcloud\.com\/configuration\/ios,requires-body=1,script-path=SoundCloudGoPlus.js

# ==========================================
# Locket Gold
# [Header Rewrite] da xoa ETag o tren -> server tra full body
# Script duoi inject Gold vao response
# Pattern don gian: match moi URL tren api.revenuecat.com (tranh nested group bug)
revenuecat = type=http-response,pattern=^https?:\/\/api\.revenuecat\.com\/,requires-body=true,max-size=-1,timeout=60,script-path=Locket_DuyVinh09.js


# ==========================================
# AlightMotion
# ==========================================
AlightMotion = type=http-response,pattern=^https:\/\/us-central1-alight-creative\.cloudfunctions\.net\/getAccountStatusAndLicenses,requires-body=true,max-size=131072,timeout=10,script-path=AlightMotion.js

# ==========================================
# PicsArt
# ==========================================
PicsArt = type=http-request,pattern=^https:\/\/api\.picsart\.com\/gw-v2\/shop\/subscription\/apple\/purchases,script-path=PicsArt.js,requires-body=true,timeout=60

# ==========================================
# Wink
# ==========================================
Wink = type=http-response,pattern=^https?:\/\/api-sub\.meitu\.com\/v2\/user\/vip_info_by_group\.json,requires-body=1,script-path=WinkVipCrack.js

# ==========================================
# Truecaller
# ==========================================
Truecaller = type=http-response,pattern=^https:\/\/premium-(.+)\.truecaller\.com\/v\d\/(subscriptions|products\/apple),requires-body=1,max-size=0,script-path=TrueCaller.js

# ==========================================
# Kinemaster
# ==========================================
Kinemaster = type=http-response,pattern=^https:\/\/api-account\.kinemasters\.com\/v\d\/user\/subscribe$,requires-body=1,max-size=0,script-path=Kinemaster.js

# ==========================================
# CamScanner
# ==========================================
Camscanner = type=http-response,pattern=^https:\/\/(api|api-cs.*)\.intsig\.net\/purchase\/cs\/query_prop,requires-body=1,script-path=camScanner.js

# ==========================================
# BeautyPlus / MeiTuXiuXiu
# ==========================================
BeautyPlus = type=http-response,pattern=^https:\/\/(api\.mr\.pixocial\.com\/v1\/manual_unlock|newbeee-api\.beautyplus\.com\/api\/v1\/asset\/balance),requires-body=true,max-size=-1,timeout=60,script-path=BeautyPlus.js
MeiTuXiuXiu = type=http-response,pattern=^https:\/\/api\.xiuxiu\.meitu\.com\/v\d\/(common_config|user_assets),requires-body=1,max-size=-1,timeout=60,script-path=MeiTuXiuXiu.js

# ==========================================
# Camera360
# ==========================================
Camera360 = type=http-response,pattern=^https?:\/\/.*\.camera360\.com\/(api\/(order\/purchase|iap\/check-receipt)|v\d\/operational-positions),requires-body=true,max-size=3145728,timeout=60,script-path=Camera360.js

# ==========================================
# SNOW (bao gồm cả app Epik) & SODA
# ==========================================
Snow = type=http-response,pattern=^https?:\/\/user-snow-api\.snow\.me\/v\d\/purchase\/subscription\/subscriber\/status,requires-body=1,max-size=-1,timeout=60,script-path=Snow.js
Soda = type=http-response,pattern=^https?:\/\/purchase-soda-api\.snow\.me\/v\d\/purchase\/subscription\/subscriber\/status,requires-body=1,max-size=-1,timeout=60,script-path=Soda.js

# ==========================================
# Lightroom (Adobe) - đúng endpoint account/entitlement
# ==========================================
Lightroom = type=http-response,pattern=^https?:\/\/lr\.adobe\.io\/v2\/account,requires-body=1,max-size=-1,timeout=60,script-path=lightroom.js

# ==========================================
# VSCO - đúng endpoint subscription
# ==========================================
VSCO = type=http-response,pattern=^https?:\/\/vsco\.co\/api\/2\.0\/subscription,requires-body=1,max-size=-1,timeout=60,script-path=VSCO.js

# ==========================================
# Nhạc Của Tui - endpoint VIP
# ==========================================
NhacCuaTui = type=http-response,pattern=^https?:\/\/(?:www\.)?nhaccuatui\.com\/.*\/vip,requires-body=1,max-size=-1,timeout=60,script-path=nhaccuatui.js

[Map Local]
^https?:\/\/[\w-]+\.googlevideo\.com\/initplayback.+&oad data-type=text data="" status-code=200

[MITM]
hostname = %APPEND%, *.googlevideo.com, youtubei.googleapis.com, www.youtube.com, s.youtube.com, -redirector*.googlevideo.com, api.revenuecat.com, sub.store, api-mobile.soundcloud.com, api.picsart.com, us-central1-alight-creative.cloudfunctions.net, api-sub.meitu.com, api.xiuxiu.meitu.com, api-account.kinemasters.com, ap*.intsig.net, api.mr.pixocial.com, newbeee-api.beautyplus.com, spclient.wg.spotify.com, *-spclient.spotify.com, *.camera360.com, user-snow-api.snow.me, purchase-soda-api.snow.me, lr.adobe.io, vsco.co, premium*.truecaller.com, www.nhaccuatui.com
